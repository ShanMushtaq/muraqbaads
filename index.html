@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:#F7F0E6;display:flex;height:100vh;overflow:hidden;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#9D9883;border-radius:3px;}

/* SIDEBAR */
aside{width:220px;flex-shrink:0;background:#1C1A15;display:flex;flex-direction:column;overflow:hidden;}
.logo-box{padding:22px 18px 14px;border-bottom:1px solid #2E2B22;}
.logo-box h1{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:#fff;letter-spacing:0.14em;}
.logo-box span{font-size:9px;color:#BE8E6F;letter-spacing:0.2em;display:block;margin-top:3px;}
nav{flex:1;overflow-y:auto;padding:8px 0;}
.phase-lbl{padding:14px 18px 4px;font-size:8px;font-weight:700;letter-spacing:0.22em;color:rgba(255,255,255,0.2);text-transform:uppercase;}
.nav-btn{display:block;width:100%;text-align:left;padding:8px 18px;background:transparent;border:none;border-left:2px solid transparent;cursor:pointer;font-size:12px;font-family:'Outfit',sans-serif;color:rgba(255,255,255,0.4);transition:all 0.15s;}
.nav-btn:hover{color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.04);}
.nav-btn.active{background:rgba(255,255,255,0.07);border-left-color:#BE8E6F;color:#fff;}
.sidebar-foot{padding:14px 18px;border-top:1px solid #2E2B22;font-size:9px;color:rgba(255,255,255,0.18);letter-spacing:0.06em;line-height:1.8;}

/* MAIN */
main{flex:1;overflow-y:auto;padding:44px 52px;background:#F7F0E6;}
.content{max-width:800px;}

/* TYPOGRAPHY */
.sec-meta{font-size:10px;font-weight:700;letter-spacing:0.15em;color:#BE8E6F;text-transform:uppercase;margin-bottom:6px;}
.sec-meta span{color:#8A8370;margin-left:8px;}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:500;color:#28251E;line-height:1.1;}
.accent-bar{width:44px;height:2px;background:#BE8E6F;margin:14px 0 28px;border-radius:1px;}
h2{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:#28251E;margin:32px 0 10px;border-bottom:1px solid #E2CCB0;padding-bottom:8px;}
p{font-size:14px;color:#28251E;line-height:1.75;margin:8px 0;}
blockquote{border-left:3px solid #BE8E6F;margin:18px 0;padding:14px 20px;background:#F6E7D1;border-radius:0 6px 6px 0;font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;color:#28251E;line-height:1.6;}
.lbl{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#BE8E6F;margin-bottom:6px;}

/* CARDS */
.card{background:rgba(255,255,255,0.6);border:1px solid #E2CCB0;border-radius:6px;padding:18px 22px;margin-bottom:14px;}
.card.ac{border-left:3px solid #BE8E6F;}
.card p{margin:6px 0;}

/* TABLE */
.tbl-wrap{overflow-x:auto;margin-top:14px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:9px 13px;background:#8A8370;color:#fff;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;}
th+th{border-left:1px solid rgba(255,255,255,0.12);}
td{padding:9px 13px;color:#28251E;border-bottom:1px solid #E2CCB0;vertical-align:top;line-height:1.55;}
td+td{border-left:1px solid #E2CCB0;}
tr:nth-child(even) td{background:rgba(255,255,255,0.25);}
tr:nth-child(odd) td{background:rgba(255,255,255,0.55);}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.tag-d{padding:5px 14px;background:#1C1A15;color:#BE8E6F;border-radius:4px;font-size:12px;}
.tag-l{padding:5px 14px;background:#E8E9E1;color:#28251E;border:1px solid #E2CCB0;border-radius:20px;font-size:12px;}
.tag-r{padding:5px 14px;background:#fff0f0;color:#c0392b;border:1px solid #ffd0cc;border-radius:20px;font-size:12px;}

/* PACKAGES */
.pkg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:14px;margin-top:14px;}
.pkg{border-radius:8px;padding:22px 18px;color:#fff;}
.pkg-lbl{font-size:9px;letter-spacing:0.2em;opacity:0.6;margin-bottom:4px;}
.pkg-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;}
.pkg-price{font-size:15px;font-weight:600;margin:10px 0;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.2);}
.pkg-item{font-size:11px;opacity:0.82;margin-bottom:5px;line-height:1.4;}
.pkg-best{margin-top:14px;font-size:10px;opacity:0.5;background:rgba(0,0,0,0.15);padding:6px 9px;border-radius:4px;}

/* COLORS */
.clr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:12px;margin-top:14px;}
.clr-card{border-radius:7px;overflow:hidden;border:1px solid #E2CCB0;}
.clr-swatch{height:68px;}
.clr-info{padding:9px 11px;background:rgba(255,255,255,0.5);}
.clr-name{font-size:12px;font-weight:600;color:#28251E;}
.clr-hex{font-size:10px;color:#8A8370;font-family:monospace;margin-top:2px;}
.clr-role{font-size:10px;color:#5C5848;margin-top:3px;line-height:1.35;}

/* STEPS */
.step{display:flex;gap:12px;margin-bottom:9px;}
.step-day{width:64px;flex-shrink:0;text-align:center;padding:8px 4px;background:#1C1A15;border-radius:6px;color:#BE8E6F;font-size:10px;font-weight:600;letter-spacing:0.06em;}
.step-body{flex:1;background:rgba(255,255,255,0.5);border:1px solid #E2CCB0;border-radius:6px;padding:10px 14px;}
.step-t{font-size:13px;font-weight:600;color:#28251E;}
.step-d{font-size:12px;color:#5C5848;margin-top:3px;line-height:1.5;}

/* PIPELINE */
.pipe{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0 22px;align-items:center;}
.pipe-s{padding:6px 12px;background:#1C1A15;color:#BE8E6F;border-radius:4px;font-size:11px;font-weight:500;}
.pipe-arr{color:#8A8370;font-size:13px;}

/* OBJECTIONS */
.obj-q{padding:11px 16px;background:#1C1A15;border-radius:6px 6px 0 0;font-family:'Cormorant Garamond',serif;font-size:18px;color:#BE8E6F;font-style:italic;line-height:1.4;margin-top:18px;}
.obj-a{padding:16px 20px;background:rgba(255,255,255,0.65);border:1px solid #E2CCB0;border-top:none;border-radius:0 0 6px 6px;font-size:13px;color:#28251E;line-height:1.8;}

/* PERSONAS */
.persona{background:rgba(255,255,255,0.6);border:1px solid #E2CCB0;border-radius:6px;padding:18px 20px;margin-bottom:16px;}
.persona-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.persona-av{width:40px;height:40px;border-radius:50%;background:#9D9883;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0;}
.persona-name{font-family:'Cormorant Garamond',serif;font-size:22px;color:#28251E;margin-top:3px;}
.p-tbl{width:100%;font-size:12px;border-collapse:collapse;}
.p-tbl td:first-child{color:#BE8E6F;font-weight:600;width:80px;padding:4px 10px 4px 0;vertical-align:top;}
.p-tbl td:last-child{color:#5C5848;padding:4px 0;line-height:1.5;border:none;background:transparent;}

/* COVER */
.cover{min-height:88vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:50px 30px;background:linear-gradient(160deg,#F7F0E6 0%,#F6E7D1 55%,#E8E9E1 100%);}
.cover-icon{width:76px;height:76px;border-radius:50%;background:#1C1A15;display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 8px 30px rgba(0,0,0,0.18);font-size:30px;}
.cover-h{font-family:'Cormorant Garamond',serif;font-size:58px;font-weight:300;color:#28251E;letter-spacing:0.2em;line-height:1;}
.cover-urdu{font-size:16px;letter-spacing:0.22em;color:#8A8370;margin-top:8px;}
.cover-line{width:54px;height:1px;background:#BE8E6F;margin:20px auto;}
.cover-sub{font-size:11px;letter-spacing:0.25em;color:#5C5848;text-transform:uppercase;}
.cover-slogan{margin-top:34px;padding:16px 26px;border:1px solid #E2CCB0;border-radius:4px;background:rgba(255,255,255,0.4);}
.cover-slogan-lbl{font-size:9px;letter-spacing:0.2em;color:#8A8370;text-transform:uppercase;margin-bottom:7px;}
.cover-slogan-txt{font-family:'Cormorant Garamond',serif;font-size:19px;color:#28251E;font-weight:500;letter-spacing:0.06em;}
.swatches{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:32px;}
.swatch{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.7);box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:360px;width:100%;margin-top:32px;}
.stat{padding:14px;background:rgba(255,255,255,0.5);border:1px solid #E2CCB0;border-radius:6px;text-align:center;}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:26px;color:#BE8E6F;font-weight:500;}
.stat-l{font-size:10px;color:#8A8370;letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;}

/* BOOK FOOTER */
.bfooter{margin-top:44px;padding:28px;background:#1C1A15;border-radius:8px;text-align:center;}
.bf-name{font-family:'Cormorant Garamond',serif;font-size:28px;color:#BE8E6F;letter-spacing:0.18em;}
.bf-line{width:36px;height:1px;background:#BE8E6F;margin:14px auto;opacity:0.4;}
.bf-slogan{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.22em;}
.bf-meta{font-size:10px;color:rgba(255,255,255,0.18);margin-top:14px;line-height:1.8;}
</style>
</head>

objections:`${hdr('05','Sales Strategy','Objection Handling')}
<div class="obj-q">"You're new, why should I trust you?"</div>
<div class="obj-a">That's a completely fair question and I respect you for asking it. Yes, I am building my client portfolio right now. But that means you get something most established agencies won't give you: my full personal attention, daily focus on your brand, and I only get paid when you actually see results. You have zero financial risk. The only thing you're testing is whether my strategy works — and I'm confident enough in it to put my payment on the line.</div>

<div class="obj-q">"Your price is too high"</div>
<div class="obj-a">I understand. Let me ask you — what would one consistent lead per day be worth to your business in a month? If my work brings you even 10 paying customers, does the fee still feel too high? And remember, you don't pay me until we hit the goal we agreed on. So the real question isn't whether my price is high — it's whether the result is worth it to you.</div>

<div class="obj-q">"I tried ads before and lost money"</div>
<div class="obj-a">That's the most common thing I hear — and honestly, most people who tried ads before were either boosting posts randomly or working with someone who didn't understand their audience. I don't boost posts. I build proper campaigns with defined targeting, tested creatives, and a clear goal. And since you've already been burned once — you don't pay me anything until you see the result we agreed on. Your past experience is exactly why my model exists.</div>`,

function buildNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  navData.forEach(group => {
    if(group.label){
      const d = document.createElement('div');
      d.className = 'phase-lbl';
      d.textContent = group.label;
      nav.appendChild(d);
    }
    group.items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'nav-btn' + (item.id===active?' active':'');
      btn.textContent = item.label;
      btn.onclick = () => {
        active = item.id;
        buildNav();
        document.getElementById('content').innerHTML = pages[active] || '';
        document.querySelector('main').scrollTop = 0;
      };
      nav.appendChild(btn);
    });
  });
}

buildNav();
document.getElementById('content').innerHTML = pages['cover'];
